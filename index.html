<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ashiwin</title>
		<style>
			:root {
				--bg: #fafafa;
				--text: #121212;
				--link: #1976d2;
			}

			@media (prefers-color-scheme: dark) {
				:root {
					--bg: #121212;
					--text: #fafafa;
					--link: #90caf9;
				}
			}

			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				background: var(--bg);
				color: var(--text);
				font-family: sans-serif;
			}

			.container {
				text-align: center;
				animation: fadeIn 2s ease-in-out both;
			}

			h1 {
				font-size: clamp(1.2rem, 3vw, 2rem);
				font-weight: 400;
				line-height: 1.5;
			}

			a {
				color: var(--link);
				text-decoration: none;
				font-weight: 700;
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				.container {
					animation: none;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>
				Welcome to
				<a
					href="https://github.com/ashiwin"
					target="_blank"
					rel="noopener"
					>Ashiwin's GitHub page</a
				>.
			</h1>
		</div>
	</body>
</html>
